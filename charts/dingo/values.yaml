---
replicaCount: 1
updateStrategy:
   type: RollingUpdate
image:
   repository: ghcr.io/blinklabs-io/dingo
   tag: "0.22.1"
   pullPolicy: IfNotPresent
mithril:
   enabled: true
   image:
      repository: ghcr.io/blinklabs-io/mithril-client
      tag: "0.12.33"
      pullPolicy: IfNotPresent
   # Mithril aggregator endpoint is derived automatically from CARDANO_NETWORK:
   # mainnet -> https://aggregator.release-mainnet.api.mithril.network/aggregator
   # preprod -> https://aggregator.release-preprod.api.mithril.network/aggregator
   # preview -> https://aggregator.pre-release-preview.api.mithril.network/aggregator
   # Other networks are not supported and will cause the init container to exit cleanly.
   # preview default; override for other networks
   genesisVerificationKey: "5b3132372c37332c3132342c3136312c362c3133372c3133312c3231332c3230372c3131372c3139382c38352c3137362c3139392c3136322c3234312c36382c3132332c3131392c3134352c31332c3233322c3234332c34392c3232392c322c3234392c3230352c3230352c33392c3233352c34345d"
   # Mainnet: curl -sL https://raw.githubusercontent.com/input-output-hk/mithril/main/mithril-infra/configuration/release-mainnet/genesis.vkey
   # Preprod: curl -sL https://raw.githubusercontent.com/input-output-hk/mithril/main/mithril-infra/configuration/release-preprod/genesis.vkey
   # Preview: curl -sL https://raw.githubusercontent.com/input-output-hk/mithril/main/mithril-infra/configuration/pre-release-preview/genesis.vkey
   # Specific snapshot digest to download (leave empty for latest)
   snapshotDigest: ""
   # Force re-download of mithril snapshot even if data exists
   # Useful for updating to a newer snapshot
   # WARNING: This will delete existing mithril data
   forceRedownload: false
   # Force re-load of Dingo database from immutable data even if database exists
   # Useful for rebuilding database from existing snapshot without re-downloading
   # WARNING: This will delete existing Dingo database
   forceReload: false
   # Cleanup mithril snapshot data after loading to reclaim storage space
   # WARNING: If forceReload is true and this is true, subsequent restarts won't be able to reload
   # Recommended: false if forceReload is true, true otherwise to save storage
   cleanupAfterLoad: false
   # Enable debug logging in init containers (shows directory listings, etc.)
   debugInit: false
environment:
   CARDANO_NETWORK: "preview"
   CARDANO_DATABASE_PATH: "/data"
   # CARDANO_BIND_ADDR: ""
   # CARDANO_CONFIG: ""
   # CARDANO_SOCKET_PATH: ""
   # CARDANO_TOPOLOGY: ""
   # CARDANO_METRICS_PORT: ""
   # CARDANO_PRIVATE_BIND_ADDR: ""
   # CARDANO_PRIVATE_PORT: ""
   # CARDANO_PORT is the relay (NtN) port
   # CARDANO_PORT: ""
   # CARDANO_INTERSECT_TIP: ""
   #
   # TLS configuration
   # TLS_CERT_FILE_PATH: ""
   # TLS_KEY_FILE_PATH: ""
   #
   # Storage mode: "core" (default, consensus only) or "api" (required for all API ports)
   # DINGO_STORAGE_MODE: "core"
   #
   # Run mode: "serve" (default), "load", "dev", or "leios"
   # DINGO_RUN_MODE: "serve"
   #
   # API ports — all disabled by default (0); require DINGO_STORAGE_MODE=api
   # UTxO RPC gRPC API
   # DINGO_UTXORPC_PORT: ""
   # Blockfrost-compatible REST API
   # DINGO_BLOCKFROST_PORT: ""
   # Mesh (Coinbase Rosetta) REST API
   # DINGO_MESH_PORT: ""
   #
   # Bark block-archive API
   # DINGO_BARK_PORT: ""
   # DINGO_BARK_BASE_URL: ""
   # DINGO_BARK_SECURITY_WINDOW: ""
   #
   # Storage plugin selection (plugin-specific config requires dingoConfig below)
   # DINGO_DATABASE_BLOB_PLUGIN: "badger"     # options: badger, gcs, s3
   # DINGO_DATABASE_METADATA_PLUGIN: "sqlite" # options: sqlite, postgres, mysql
# Dingo YAML config file. When enabled, creates a Secret mounted at
# /etc/dingo/dingo.yaml and passes --config to dingo on startup.
# Use for plugin-specific config that cannot be expressed as env vars:
# S3/GCS bucket names, Postgres/MySQL connection strings, cache tuning, etc.
# Full reference: https://github.com/blinklabs-io/dingo/blob/main/dingo.yaml.example
dingoConfig:
   enabled: false
   data: ""
   # data: |
   #   database:
   #     blob:
   #       plugin: s3
   #       s3:
   #         bucket: my-dingo-bucket
   #         region: us-east-1
   #     metadata:
   #       plugin: postgres
   #       postgres:
   #         host: postgres.example.com
   #         port: 5432
   #         user: dingo
   #         password: secret
   #         database: dingo
# Block production (SPO mode)
# When enabled, dingo runs as a stake pool operator producing blocks.
# Key file contents are provided inline and a Kubernetes Secret is created
# automatically — the same pattern used by the cardano-node chart.
blockProducer:
   enabled: false
   keys: []
   # - name: vrf.skey
   #   type: VrfSigningKey_PraosVRF
   #   description: VRF Signing Key
   #   cborHex: ""
   # - name: kes.skey
   #   type: KesSigningKey_ed25519_kes_2^6
   #   description: KES Signing Key
   #   cborHex: ""
   # - name: node.cert
   #   type: NodeOperationalCertificate
   #   description: ""
   #   cborHex: ""
   # Forging tolerances — leave at 0 to use dingo's built-in defaults
   # (default: forgeSyncToleranceSlots=100, forgeStaleGapThresholdSlots=1000)
   forgeSyncToleranceSlots: 0
   forgeStaleGapThresholdSlots: 0
# Custom topology. When disabled dingo uses its built-in ledger peer discovery.
topology:
   enabled: false
#  bootstrapPeers:
#    - address: preview-node.play.dev.cardano.org
#      port: 3001
#  localRoots:
#    - accessPoints:
#        - name: Example
#          address: preview-node.play.dev.cardano.org
#          port: 3001
#      advertise: false
#      trustable: true
#      valency: 1
#    - accessPoints:
#        - name: Example
#          address: preview-node.play.dev.cardano.org
#          port: 3001
#        - name: Example
#          address: preview-node.play.dev.cardano.org
#          port: 3001
#      advertise: true
#      trustable: false
#      valency: 2
#  publicRoots:
#    - advertise: true
#      accessPoints:
#        - address: preview-node.play.dev.cardano.org
#          port: 3001
#          name: "Example"
#  # useLedgerAfterSlot: -1 to disable ledger peer discovery
#  useLedgerAfterSlot: 83116868

# Enable the PodMonitor for Prometheus Operator
podMonitor:
   enabled: false
   # extraLabels: {}
   # Promote pod labels to Prometheus metric labels
   # podTargetLabels: []
   # Required for Prometheus >= v3.0.0
   fallbackScrapeProtocol: "PrometheusText0.0.4"
   podMetricsEndpoints:
      - port: metrics
        path: /metrics
        interval: 30s
resources: {}
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 100m
#   memory: 128Mi

affinity: {}
# affinity:
#   podAntiAffinity:
#     requiredDuringSchedulingIgnoredDuringExecution:
#       - labelSelector:
#           matchExpressions:
#             - key: app.kubernetes.io/name
#               operator: In
#               values:
#                 - dingo
#         topologyKey: kubernetes.io/hostname

tolerations: []
persistence:
   accessMode: ReadWriteOnce
   size: 60Gi
   # storageClass: "hyperdisk-balanced"
service:
   annotations: {}
   type: ClusterIP
   sessionAffinity: "ClientIP"
   ports:
      private: 3002
      relay: 3001
      utxorpc: 9090
      # blockfrost and mesh are 0 (disabled) by default; set to a non-zero value
      # to expose in the Service (must match DINGO_BLOCKFROST_PORT / DINGO_MESH_PORT).
      blockfrost: 0
      mesh: 0
      bark: 0
      metrics: 12798
serviceAccount:
   annotations: {}
   name: ""
