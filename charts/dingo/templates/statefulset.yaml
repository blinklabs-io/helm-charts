---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "dingo.fullname" . }}
  labels:
    {{- include "dingo.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "dingo.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  {{- if .Values.updateStrategy }}
  updateStrategy:
    type: {{ .Values.updateStrategy.type }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "dingo.matchLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
        kubectl.kubernetes.io/default-container: dingo
{{- if .Values.blockProducer.enabled }}
        checksum/keys: {{ .Values.blockProducer.keys | toJson | sha256sum }}
{{- end }}
{{- if .Values.topology.enabled }}
        checksum/topology: {{ .Values.topology | toJson | sha256sum }}
{{- end }}
      labels:
        {{- include "dingo.labels" . | nindent 8 }}
{{- with .Values.extraPodLabels }}
{{ toYaml . | indent 8 }}
{{- end }}
    spec:
      serviceAccountName: {{ include "dingo.fullname" . }}
{{- if .Values.affinity }}
      affinity: {{ .Values.affinity | toYaml | nindent 8 }}
{{- end }}
{{- if .Values.tolerations }}
      tolerations: {{- toYaml .Values.tolerations | nindent 8 }}
{{- end }}
{{- if .Values.mithril.enabled }}
      initContainers:
      # Native Mithril bootstrap using dingo's built-in mithril sync
      - name: mithril-sync
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          runAsUser: 0
          readOnlyRootFilesystem: false
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e

            if [ "$DEBUG_INIT" = "true" ]; then
              echo "DEBUG: Checking data directory..."
              ls -la {{ .Values.environment.CARDANO_DATABASE_PATH }} || true
            fi

            # Check if database already exists (skip sync if data present)
            if [ -f "{{ .Values.environment.CARDANO_DATABASE_PATH }}/metadata.sqlite" ] && [ "$FORCE_RESYNC" != "true" ]; then
              echo "Database already exists, skipping mithril sync"
              exit 0
            fi

            # Remove existing data if force resync is enabled
            if [ "$FORCE_RESYNC" = "true" ]; then
              echo "Force resync enabled, removing existing database..."
              rm -rf {{ .Values.environment.CARDANO_DATABASE_PATH }}/blob/* \
                     {{ .Values.environment.CARDANO_DATABASE_PATH }}/db/* \
                     {{ .Values.environment.CARDANO_DATABASE_PATH }}/metadata.sqlite* \
                     {{ .Values.environment.CARDANO_DATABASE_PATH }}/.mithril-cache/* 2>/dev/null || true
            fi

            echo "Starting native mithril sync..."
            echo "(This could take a while...)"

            # Run dingo mithril sync - handles download, load, and ledger catchup
            # Network, database path, and mithril config are picked up from env vars
            dingo mithril sync

            echo "Mithril sync complete"
        env:
          {{- range $key, $value := .Values.environment }}
          {{- if not (kindIs "invalid" $value) }}
          - name: {{ $key }}
            value: "{{ $value }}"
          {{- end }}
          {{- end }}
          {{- if .Values.mithril.aggregatorUrl }}
          - name: DINGO_MITHRIL_AGGREGATOR_URL
            value: {{ .Values.mithril.aggregatorUrl | quote }}
          {{- end }}
          {{- if .Values.mithril.downloadDir }}
          - name: DINGO_MITHRIL_DOWNLOAD_DIR
            value: {{ .Values.mithril.downloadDir | quote }}
          {{- end }}
          - name: DINGO_MITHRIL_CLEANUP
            value: {{ .Values.mithril.cleanupAfterLoad | quote }}
          - name: DINGO_MITHRIL_VERIFY_CERTS
            value: {{ .Values.mithril.verifyCertificates | quote }}
          - name: FORCE_RESYNC
            value: {{ .Values.mithril.forceResync | quote }}
          - name: DEBUG_INIT
            value: {{ .Values.mithril.debugInit | quote }}
        volumeMounts:
          - name: dingo-data
            mountPath: {{ .Values.environment.CARDANO_DATABASE_PATH }}
        {{- if .Values.mithril.resources }}
        resources: {{- toYaml .Values.mithril.resources | nindent 12 }}
        {{- end }}
{{- end }}
      containers:
      - name: dingo
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          runAsUser: 0
          readOnlyRootFilesystem: false
        env:
          {{- range $key, $value := .Values.environment }}
          {{- if not (kindIs "invalid" $value) }}
          - name: {{ $key }}
            value: "{{ $value }}"
          {{- end }}
          {{- end }}
{{- if .Values.blockProducer.enabled }}
          - name: CARDANO_BLOCK_PRODUCER
            value: "true"
          - name: CARDANO_SHELLEY_KES_KEY
            value: "/keys/kes.skey"
          - name: CARDANO_SHELLEY_OPERATIONAL_CERTIFICATE
            value: "/keys/node.cert"
          - name: CARDANO_SHELLEY_VRF_KEY
            value: "/keys/vrf.skey"
          - name: DINGO_FORGE_SYNC_TOLERANCE_SLOTS
            value: {{ .Values.blockProducer.forgeSyncToleranceSlots | quote }}
          - name: DINGO_FORGE_STALE_GAP_THRESHOLD_SLOTS
            value: {{ .Values.blockProducer.forgeStaleGapThresholdSlots | quote }}
          - name: DINGO_SLOTS_PER_KES_PERIOD
            value: {{ .Values.blockProducer.slotsPerKESPeriod | quote }}
          - name: DINGO_MAX_KES_EVOLUTIONS
            value: {{ .Values.blockProducer.maxKESEvolutions | quote }}
{{- end }}
{{- if .Values.topology.enabled }}
          - name: CARDANO_TOPOLOGY
            value: "/config/topology.json"
{{- end }}
        ports:
          - name: relay
            containerPort: {{ .Values.environment.CARDANO_PORT | default .Values.service.ports.relay }}
          - name: private
            containerPort: {{ .Values.environment.CARDANO_PRIVATE_PORT | default .Values.service.ports.private }}
          - name: metrics
            containerPort: {{ .Values.environment.CARDANO_METRICS_PORT | default .Values.service.ports.metrics }}
{{- if gt (int (default "0" (default .Values.service.ports.utxorpc .Values.environment.DINGO_UTXORPC_PORT))) 0 }}
          - name: utxorpc
            containerPort: {{ .Values.environment.DINGO_UTXORPC_PORT | default .Values.service.ports.utxorpc }}
{{- end }}
{{- if gt (int (default "0" (default .Values.service.ports.blockfrost .Values.environment.DINGO_BLOCKFROST_PORT))) 0 }}
          - name: blockfrost
            containerPort: {{ .Values.environment.DINGO_BLOCKFROST_PORT | default .Values.service.ports.blockfrost }}
{{- end }}
{{- if gt (int (default "0" (default .Values.service.ports.mesh .Values.environment.DINGO_MESH_PORT))) 0 }}
          - name: mesh
            containerPort: {{ .Values.environment.DINGO_MESH_PORT | default .Values.service.ports.mesh }}
{{- end }}
        volumeMounts:
          - name: dingo-data
            mountPath: {{ .Values.environment.CARDANO_DATABASE_PATH }}
{{- if .Values.topology.enabled }}
          - name: topology
            mountPath: /config/topology.json
            subPath: topology.json
{{- end }}
{{- if .Values.blockProducer.enabled }}
          - name: block-producer-keys
            mountPath: /keys
            readOnly: true
{{- end }}
        {{- if .Values.resources }}
        resources: {{- toYaml .Values.resources | nindent 12 }}
        {{- end }}
{{- if .Values.sidecars }}
{{ toYaml .Values.sidecars | nindent 6 }}
{{- end }}
      restartPolicy: Always
      volumes:
{{- if .Values.topology.enabled }}
      - name: topology
        configMap:
          name: {{ include "dingo.fullname" . }}-topology
          defaultMode: 0644
{{- end }}
{{- if .Values.blockProducer.enabled }}
      - name: block-producer-keys
        secret:
          defaultMode: 0600
          secretName: {{ include "dingo.fullname" . }}-keys
{{- end }}
  volumeClaimTemplates:
    - metadata:
        name: dingo-data
        labels:
          cardano_network: {{ include "dingo.network" . }}
      spec:
        accessModes:
        - {{ .Values.persistence.accessMode }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
