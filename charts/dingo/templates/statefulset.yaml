apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "dingo.fullname" . }}
  labels:
    {{- include "dingo.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "dingo.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  {{- if .Values.updateStrategy }}
  updateStrategy:
    type: {{ .Values.updateStrategy.type }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "dingo.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        app.kubernetes.io/name: {{ include "dingo.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
        kubectl.kubernetes.io/default-container: dingo
        {{- if .Values.blockProducer.enabled }}
        checksum/keys: {{ .Values.blockProducer.keys | toJson | sha256sum }}
        {{- end }}
        {{- if .Values.topology.enabled }}
        checksum/topology: {{ .Values.topology | toJson | sha256sum }}
        {{- end }}
        {{- if .Values.dingoConfig.enabled }}
        checksum/config: {{ .Values.dingoConfig.data | sha256sum }}
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name | default .Release.Name }}
      {{- if .Values.affinity }}
      affinity: {{- toYaml .Values.affinity | nindent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations: {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.mithril.enabled }}
      initContainers:
      # Download Cardano snapshot using mithril-client
      - name: mithril-snapshot
        image: {{ .Values.mithril.image.repository }}:{{ .Values.mithril.image.tag }}
        imagePullPolicy: {{ .Values.mithril.image.pullPolicy }}
        securityContext:
          runAsUser: 0
          runAsGroup: 0
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e
            NETWORK="{{ .Values.environment.CARDANO_NETWORK }}"
            case ${NETWORK} in
              mainnet|preprod) __path=release-${NETWORK} ;;
              preview) __path=pre-release-${NETWORK} ;;
              *) echo "Mithril not supported on ${NETWORK}"; exit 1 ;;
            esac
            export AGGREGATOR_ENDPOINT=https://aggregator.${__path}.api.mithril.network/aggregator
            if [ "$DEBUG_INIT" = "true" ]; then
              echo "DEBUG: Checking mithril data directory..."
              ls -la /mithril-data/ || true
              echo "DEBUG: Checking for db subdirectory..."
              ls -la /mithril-data/db/ || true
            fi

            # Check if snapshot was successfully downloaded (marker file indicates complete download)
            if [ -f "/mithril-data/.download-complete" ] && [ "$FORCE_REDOWNLOAD" != "true" ]; then
              echo "Mithril snapshot already exists at /mithril-data/db/ (verified by marker file)"
              exit 0
            fi

            # Remove existing data if force redownload is enabled
            if [ "$FORCE_REDOWNLOAD" = "true" ]; then
              echo "Force redownload enabled, removing existing mithril data..."
              rm -rf /mithril-data/*
            fi

            echo "Starting mithril snapshot download..."
            if mithril-client cardano-db download {{ .Values.mithril.snapshotDigest | default "latest" }} \
              --download-dir /mithril-data \
              --json; then
              # Create marker file to indicate successful download
              touch /mithril-data/.download-complete
              echo "Mithril snapshot download complete"
            else
              echo "ERROR: Mithril snapshot download failed"
              exit 1
            fi
        env:
          - name: GENESIS_VERIFICATION_KEY
            value: {{ required "mithril.genesisVerificationKey must be set when mithril.enabled is true" .Values.mithril.genesisVerificationKey | quote }}
          - name: FORCE_REDOWNLOAD
            value: {{ .Values.mithril.forceRedownload | quote }}
          - name: DEBUG_INIT
            value: {{ .Values.mithril.debugInit | quote }}
        volumeMounts:
          - name: dingo-data
            mountPath: /mithril-data
            subPath: mithril
        {{- if .Values.resources }}
        resources: {{- toYaml .Values.resources | nindent 12 }}
        {{- end }}
      # Load blocks from immutable DB into Dingo's database
      - name: dingo-load
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          runAsUser: 0
          runAsGroup: 0
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e
            if [ "$DEBUG_INIT" = "true" ]; then
              echo "DEBUG: Listing CARDANO_DATABASE_PATH..."
              ls -la {{ .Values.environment.CARDANO_DATABASE_PATH }} || true
              echo "DEBUG: Listing mithril data directory..."
              ls -la /mithril-data/ || true
              echo "DEBUG: Listing mithril db subdirectory..."
              ls -la /mithril-data/db/ || true
              # echo "DEBUG: Checking for immutable directory..."
              # ls -la /mithril-data/db/immutable/ || true
            fi

            # Check if force reload is enabled
            if [ "$FORCE_RELOAD" = "true" ]; then
              echo "Force reload enabled, removing existing Dingo database..."
              rm -rf {{ .Values.environment.CARDANO_DATABASE_PATH }}/blob/* \
                     {{ .Values.environment.CARDANO_DATABASE_PATH }}/db/* \
                     {{ .Values.environment.CARDANO_DATABASE_PATH }}/metadata.sqlite* 2>/dev/null || true
              rmdir {{ .Values.environment.CARDANO_DATABASE_PATH }}/blob \
                    {{ .Values.environment.CARDANO_DATABASE_PATH }}/db 2>/dev/null || true
            fi

            # Check if Dingo database already initialized (dingo creates blob/, db/, and metadata.sqlite)
            if [ -f "{{ .Values.environment.CARDANO_DATABASE_PATH }}/metadata.sqlite" ]; then
              echo "Dingo database already initialized, skipping load"
              exit 0
            fi

            # Check if immutable data exists (mithril downloads to db/ subdirectory)
            if [ ! -d "/mithril-data/db/immutable" ] || [ "$(ls -A /mithril-data/db/immutable 2>/dev/null | wc -l)" -eq 0 ]; then
              echo "ERROR: No immutable data found at /mithril-data/db/immutable"
              exit 1
            fi

            echo "Loading immutable data into Dingo database..."
            cd {{ .Values.environment.CARDANO_DATABASE_PATH }}
            dingo load{{- if .Values.dingoConfig.enabled }} --config /etc/dingo/dingo.yaml{{- end }} /mithril-data/db/immutable
            echo "Dingo load complete"

            # Cleanup mithril data to reclaim storage space (if configured)
            if [ "$CLEANUP_AFTER_LOAD" = "true" ]; then
              echo "Cleaning up mithril snapshot data to reclaim storage..."
              rm -rf /mithril-data/*
              echo "Cleanup complete - reclaimed storage space."
            else
              echo "Keeping mithril snapshot data for potential reloads"
            fi
        env:
          {{- range $key, $value := .Values.environment }}
          - name: {{ $key }}
            value: {{ $value | quote }}
          {{- end }}
          - name: FORCE_RELOAD
            value: {{ .Values.mithril.forceReload | quote }}
          - name: CLEANUP_AFTER_LOAD
            value: {{ .Values.mithril.cleanupAfterLoad | quote }}
          - name: DEBUG_INIT
            value: {{ .Values.mithril.debugInit | quote }}
        volumeMounts:
          - name: dingo-data
            mountPath: {{ .Values.environment.CARDANO_DATABASE_PATH }}
          - name: dingo-data
            mountPath: /mithril-data
            subPath: mithril
        {{- if .Values.dingoConfig.enabled }}
          - name: dingo-config
            mountPath: /etc/dingo/dingo.yaml
            subPath: dingo.yaml
            readOnly: true
        {{- end }}
        {{- if .Values.resources }}
        resources: {{- toYaml .Values.resources | nindent 12 }}
        {{- end }}
      {{- end }}
      containers:
      - name: dingo
        command: ["dingo"]
        {{- if .Values.dingoConfig.enabled }}
        args: ["--config", "/etc/dingo/dingo.yaml"]
        {{- end }}
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
          {{- range $key, $value := .Values.environment }}
          {{- if $value }}
          - name: {{ $key }}
            value: "{{ $value }}"
          {{- end }}
          {{- end }}
          {{- if not (index .Values.environment "CARDANO_CONFIG") }}
          - name: CARDANO_CONFIG
            value: "/opt/cardano/config/{{ .Values.environment.CARDANO_NETWORK }}/config.json"
          {{- end }}
          - name: CARDANO_TOPOLOGY
            value: "/opt/cardano/config/{{ .Values.environment.CARDANO_NETWORK }}/topology.json"
          {{- if .Values.blockProducer.enabled }}
          - name: CARDANO_BLOCK_PRODUCER
            value: "true"
          - name: CARDANO_SHELLEY_VRF_KEY
            value: "/keys/vrf.skey"
          - name: CARDANO_SHELLEY_KES_KEY
            value: "/keys/kes.skey"
          - name: CARDANO_SHELLEY_OPERATIONAL_CERTIFICATE
            value: "/keys/node.cert"
          {{- if .Values.blockProducer.forgeSyncToleranceSlots }}
          - name: DINGO_FORGE_SYNC_TOLERANCE_SLOTS
            value: {{ .Values.blockProducer.forgeSyncToleranceSlots | quote }}
          {{- end }}
          {{- if .Values.blockProducer.forgeStaleGapThresholdSlots }}
          - name: DINGO_FORGE_STALE_GAP_THRESHOLD_SLOTS
            value: {{ .Values.blockProducer.forgeStaleGapThresholdSlots | quote }}
          {{- end }}
          {{- end }}
          - name: DINGO_SOCKET_PATH
            value: /ipc/dingo.socket
          - name: CARDANO_SOCKET_PATH
            value: /ipc/dingo.socket
          - name: CARDANO_NODE_SOCKET_PATH
            value: /ipc/dingo.socket
        ports:
          - name: private
            containerPort: {{ .Values.service.ports.private }}
          - name: relay
            containerPort: {{ .Values.environment.CARDANO_PORT | default .Values.service.ports.relay }}
          - name: utxorpc
            containerPort: {{ .Values.environment.DINGO_UTXORPC_PORT | default .Values.service.ports.utxorpc }}
          - name: metrics
            containerPort: {{ .Values.environment.CARDANO_METRICS_PORT | default .Values.service.ports.metrics }}
        volumeMounts:
          - name: dingo-data
            mountPath: {{ .Values.environment.CARDANO_DATABASE_PATH }}
          {{- if .Values.blockProducer.enabled }}
          - name: block-producer-keys
            mountPath: /keys
            readOnly: true
          {{- end }}
          {{- if .Values.topology.enabled }}
          - name: topology
            mountPath: /opt/cardano/config/{{ .Values.environment.CARDANO_NETWORK }}/topology.json
            subPath: topology.json
            readOnly: true
          {{- end }}
          - name: node-ipc
            mountPath: /ipc
          {{- if .Values.dingoConfig.enabled }}
          - name: dingo-config
            mountPath: /etc/dingo/dingo.yaml
            subPath: dingo.yaml
            readOnly: true
          {{- end }}
        {{- if .Values.resources }}
        resources: {{- toYaml .Values.resources | nindent 12 }}
        {{- end }}
      volumes:
      - name: node-ipc
        emptyDir: {}
      {{- if .Values.blockProducer.enabled }}
      - name: block-producer-keys
        secret:
          defaultMode: 0600
          secretName: {{ .Release.Name }}-secret
      {{- end }}
      {{- if .Values.topology.enabled }}
      - name: topology
        configMap:
          name: {{ include "dingo.fullname" . }}-topology
          defaultMode: 0644
      {{- end }}
      {{- if .Values.dingoConfig.enabled }}
      - name: dingo-config
        secret:
          secretName: {{ include "dingo.fullname" . }}-config
          defaultMode: 0600
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: dingo-data
      spec:
        accessModes:
        - {{ .Values.persistence.accessMode }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
