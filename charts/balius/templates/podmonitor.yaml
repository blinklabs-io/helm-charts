{{- if .Values.balius.podmonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "balius.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- with .Values.balius.podmonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels: {{- include "balius.selectorLabels" . | nindent 6 }}
  {{- with .Values.balius.podmonitor.podTargetLabels }}
  podTargetLabels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  podMetricsEndpoints:
    {{- if .Values.balius.podmonitor.podMetricsEndpoints }}
    {{- toYaml .Values.balius.podmonitor.podMetricsEndpoints | nindent 4 }}
    {{- else }}
    - port: metrics
      path: /metrics
    {{- end }}
{{- end }}
