---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "handshake-node.fullname" . }}-headless
  labels:
    {{- include "handshake-node.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: p2p
      port: {{ .Values.service.p2p.port }}
      targetPort: p2p
      protocol: TCP
  selector:
    {{- include "handshake-node.matchLabels" . | nindent 4 }}
