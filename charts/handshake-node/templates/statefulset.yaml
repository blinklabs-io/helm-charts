---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "handshake-node.fullname" . }}
  labels:
    {{- include "handshake-node.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "handshake-node.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  {{- with .Values.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if and .Values.persistence.enabled .Values.persistence.retention }}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: {{ .Values.persistence.retention.whenDeleted | default "Retain" }}
    whenScaled: {{ .Values.persistence.retention.whenScaled | default "Retain" }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "handshake-node.matchLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "handshake-node.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        kubectl.kubernetes.io/default-container: handshake-node
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "handshake-node.serviceAccountName" . }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: handshake-node
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- $network := include "handshake-node.network" . }}
          {{- $networkNeedsArg := has $network (list "regtest" "simnet" "testnet") }}
          {{- if or $networkNeedsArg .Values.metrics.enabled .Values.stratum.enabled }}
          args:
            {{- if eq $network "regtest" }}
            - --regtest
            {{- else if eq $network "simnet" }}
            - --simnet
            {{- else if eq $network "testnet" }}
            - --testnet
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - --metricslisten={{ .Values.metrics.listen }}
            {{- if .Values.metrics.allowPublic }}
            - --metricsallowpublic
            {{- end }}
            {{- end }}
            {{- if .Values.stratum.enabled }}
            - --stratumlisten={{ .Values.stratum.listen }}
            {{- if .Values.stratum.allowPublic }}
            - --stratumallowpublic
            {{- end }}
            {{- with .Values.stratum.miningAddress }}
            - --miningaddr={{ . }}
            {{- end }}
            {{- end }}
          {{- end }}
          env:
            - name: HOME
              value: /home/handshake
            {{- if .Values.config.listen }}
            - name: HANDSHAKE_NODE_LISTEN
              value: {{ .Values.config.listen | quote }}
            {{- end }}
            {{- if and .Values.rpc.enabled .Values.config.rpclisten }}
            - name: HANDSHAKE_NODE_RPCLISTEN
              value: {{ .Values.config.rpclisten | quote }}
            {{- end }}
            {{- if and .Values.rpc.enabled .Values.config.rpcallowip }}
            - name: HANDSHAKE_NODE_RPCALLOWIP
              value: {{ .Values.config.rpcallowip | quote }}
            {{- end }}
            {{- if .Values.rpc.enabled }}
            {{- $secretName := required "rpc.existingSecret is required when rpc.enabled=true" .Values.rpc.existingSecret }}
            - name: HANDSHAKE_NODE_RPCUSER
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ .Values.rpc.userKey }}
            - name: HANDSHAKE_NODE_RPCPASS
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ .Values.rpc.passwordKey }}
            {{- end }}
            {{- if and .Values.stratum.enabled .Values.stratum.auth.existingSecret }}
            - name: HANDSHAKE_NODE_STRATUMUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.stratum.auth.existingSecret }}
                  key: {{ .Values.stratum.auth.userKey }}
            - name: HANDSHAKE_NODE_STRATUMPASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.stratum.auth.existingSecret }}
                  key: {{ .Values.stratum.auth.passwordKey }}
            {{- end }}
            {{- range $k, $v := .Values.config.extra }}
            {{- if not (kindIs "invalid" $v) }}
            - name: HANDSHAKE_NODE_{{ $k | upper | replace "-" "_" }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: p2p
              containerPort: {{ .Values.service.p2p.port }}
              protocol: TCP
            {{- if .Values.rpc.enabled }}
            - name: rpc
              containerPort: {{ .Values.rpcService.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.service.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.stratum.enabled }}
            - name: stratum
              containerPort: {{ .Values.stratum.service.port }}
              protocol: TCP
            {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            tcpSocket:
              port: {{ .Values.startupProbe.tcpSocket.port }}
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.readinessProbe.tcpSocket.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.livenessProbe.tcpSocket.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /home/handshake/.handshake-node
            - name: tmp
              mountPath: /tmp
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if and .Values.persistence.enabled .Values.persistence.existingClaim }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
        {{- else if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
  {{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "handshake-node.labels" . | nindent 10 }}
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
