{{- if and .Values.metrics.enabled .Values.metrics.allowPublic }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "handshake-node.metricsName" . }}
  labels:
    {{- include "handshake-node.labels" . | nindent 4 }}
    app.kubernetes.io/component: metrics
  {{- with .Values.metrics.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # Metrics stays private. Do not change this Service type in this chart.
  type: ClusterIP
  ports:
    - name: metrics
      port: {{ .Values.metrics.service.port }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "handshake-node.matchLabels" . | nindent 4 }}
{{- end }}
