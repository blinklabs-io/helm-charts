---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "handshake-node.p2pName" . }}
  labels:
    {{- include "handshake-node.labels" . | nindent 4 }}
  {{- with (merge (dict) .Values.service.p2p.annotations .Values.serviceAnnotations) }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.p2p.type | default "ClusterIP" }}
  {{- if and (or (eq .Values.service.p2p.type "LoadBalancer") (eq .Values.service.p2p.type "NodePort")) .Values.service.p2p.externalTrafficPolicy }}
  externalTrafficPolicy: {{ .Values.service.p2p.externalTrafficPolicy }}
  {{- end }}
  {{- if and (eq .Values.service.p2p.type "LoadBalancer") .Values.service.p2p.loadBalancerIP }}
  loadBalancerIP: {{ .Values.service.p2p.loadBalancerIP }}
  {{- end }}
  {{- if and (eq .Values.service.p2p.type "LoadBalancer") .Values.service.p2p.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml .Values.service.p2p.loadBalancerSourceRanges | nindent 4 }}
  {{- end }}
  ports:
    - name: p2p
      port: {{ .Values.service.p2p.port }}
      targetPort: p2p
      protocol: TCP
      {{- if and (or (eq .Values.service.p2p.type "NodePort") (eq .Values.service.p2p.type "LoadBalancer")) .Values.service.p2p.nodePort }}
      nodePort: {{ .Values.service.p2p.nodePort }}
      {{- end }}
  selector:
    {{- include "handshake-node.matchLabels" . | nindent 4 }}
