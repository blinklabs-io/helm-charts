---
# Default values for handshake-node.

replicaCount: 1

updateStrategy:
  type: RollingUpdate

nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/blinklabs-io/handshake-node
  # Explicit tag; do not rely on "latest". 0.2.0-rc1 is the earliest published
  # image whose binary self-reports the matching version and whose named user
  # ("handshake", UID 100 / GID 101) matches the numeric runAsUser/runAsGroup
  # defaults below.
  tag: "0.2.0-rc1"
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Handshake network. Supported: main, regtest.
# The upstream handshake-node binary does not implement --testnet or --simnet
# yet, so those modes are rejected by the chart's network validator.
# Default is mainnet as required.
network: main

# Node runtime configuration. These render into HANDSHAKE_NODE_* environment
# variables which the daemon consumes at startup. Keys should be the long-form
# CLI option name in uppercase without the leading "--"; dashes become
# underscores per upstream configuration precedence rules.
#
# Only include keys you actually want to set. Anything left empty or unset is
# omitted from the environment so upstream defaults apply.
#
# The following env names are reserved by the chart and cannot be set via
# config.extra or extraEnv (render fails). Chart-managed listener values are
# reserved so a duplicate env cannot silently shadow the validated one:
#   HANDSHAKE_NODE_LISTEN, HANDSHAKE_NODE_RPCLISTEN,
#   HANDSHAKE_NODE_RPCALLOWIP, HANDSHAKE_NODE_RPCUSER,
#   HANDSHAKE_NODE_RPCPASS, HANDSHAKE_NODE_STRATUMUSER,
#   HANDSHAKE_NODE_STRATUMPASS
# Use the corresponding chart values instead (service.p2p.port,
# rpcService.port, config.listen, config.rpclisten, config.rpcallowip,
# rpc.existingSecret, stratum.auth.existingSecret).
config:
  # Optional daemon listen override. Leave empty to let the chart derive
  #   0.0.0.0:<service.p2p.port>
  # so the Pod P2P listener always matches the Service target port. If set,
  # the value MUST end with ":<service.p2p.port>" (e.g. "192.168.1.10:12038")
  # so the container port, Service target port, and TCP probes stay in sync.
  # To change the port itself, edit service.p2p.port instead.
  listen: ""
  # RPC listener. Leave empty to let the chart derive
  #   0.0.0.0:<rpcService.port>
  # when rpc.enabled=true. The RPC Service is ClusterIP-only, so the daemon
  # must bind on a Pod-reachable address rather than loopback. If set, the
  # value MUST end with ":<rpcService.port>"; change rpcService.port to
  # change the port itself.
  rpclisten: ""
  # rpcallowip is a comma-separated CIDR list that the daemon uses as its RPC
  # allowlist. It is REQUIRED when rpc.enabled=true because the ClusterIP
  # Service does not restrict source Pods on its own; without an allowlist,
  # any workload in the cluster could reach the listener. Set this to the
  # source CIDR of trusted client Pods (normally their Pod CIDR — account for
  # CNI SNAT which may replace the source with the node IP). A Service CIDR
  # is a destination range and does not match client source addresses; pair
  # this allowlist with a NetworkPolicy for finer-grained enforcement.
  rpcallowip: ""
  # Extra long-form options, keyed by uppercase option name.
  # Example:
  #   MAXPEERS: "125"
  extra: {}

# RPC credentials. Loaded from an existing Kubernetes Secret. Credentials must
# not be baked into values or ConfigMaps. Leave rpc.enabled=false to run
# handshake-node without an RPC listener (upstream disables RPC unless both
# rpcuser and rpcpass are set).
rpc:
  enabled: false
  existingSecret: ""
  userKey: rpcuser
  passwordKey: rpcpass

# Persistence for /home/handshake/.handshake-node
persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 200Gi
  # storageClass: ""
  # If set, an existing PVC name to bind instead of using the template.
  existingClaim: ""
  annotations: {}
  # Retain the PVC when the StatefulSet is deleted.
  # Kubernetes 1.27+ supports .spec.persistentVolumeClaimRetentionPolicy.
  retention:
    whenDeleted: Retain
    whenScaled: Retain
  # Ownership init container. On first mount the PVC is owned by root:root,
  # which the non-root main container cannot write to. fsGroup is intentionally
  # NOT used because kubelet's fsGroup logic recursively adds group r/w on
  # every file (including handshake-node's Brontide identity key, which the
  # daemon refuses to load unless it is 0600). A one-shot chown init container
  # sets ownership recursively without touching file modes, so pre-populated
  # existingClaim volumes and the Brontide 0600 mode both remain intact.
  chownInitContainer:
    enabled: true
    image: busybox:1.36.1
    imagePullPolicy: IfNotPresent

# Pod security context. Handshake node runs as the non-root "handshake" user
# baked into the upstream image (UID 100 / GID 101). runAsUser / runAsGroup
# are set numerically so kubelet can enforce runAsNonRoot without needing to
# resolve the image's /etc/passwd. fsGroup is deliberately omitted; the
# persistence.chownInitContainer handles PVC ownership without clobbering
# owner-only file modes on the Brontide identity key.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 100
  runAsGroup: 101
  seccompProfile:
    type: RuntimeDefault

# Container security context. Locked down by default.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true

# Peer-to-peer service. Kept ClusterIP by default; operators must explicitly
# opt into any public exposure by setting service.p2p.type to LoadBalancer or
# NodePort.
#
# NOTE: NodePort only pins the node-side port; handshake-node does not
# advertise it to peers on its own. When exposing via NodePort, also set
# config.extra.EXTERNALIP to the routable "<node-ip>:<nodePort>" so the
# daemon advertises a reachable address to the P2P network.
service:
  p2p:
    type: ClusterIP
    port: 12038
    # Optional fixed NodePort when service.p2p.type=NodePort. Pair with
    # config.extra.EXTERNALIP to advertise the routable address to peers.
    nodePort: ""
    annotations: {}
    # externalTrafficPolicy applies to NodePort and LoadBalancer only.
    externalTrafficPolicy: ""
    loadBalancerIP: ""
    loadBalancerSourceRanges: []

# Private RPC service (ClusterIP only, never publicly exposed by this chart).
rpcService:
  # Defaults to whether rpc.enabled is true.
  enabled: null
  port: 12037
  annotations: {}

# Metrics endpoint. Prometheus text format on /metrics. Off by default;
# private when on.
metrics:
  enabled: false
  # Optional explicit listener override in host:port form. Leave empty to let
  # the chart derive it as:
  #   0.0.0.0:<metrics.service.port> when allowPublic=true
  #   127.0.0.1:<metrics.service.port> when allowPublic=false
  # so bind and Service target port always match, and the daemon never rejects
  # a public bind because the --metricsallowpublic flag was withheld. If set,
  # the value MUST end with ":<metrics.service.port>"; edit
  # metrics.service.port to change the port.
  listen: ""
  allowPublic: true
  service:
    port: 12039
    annotations: {}
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: ""
    path: /metrics
    labels: {}
    relabelings: []
    metricRelabelings: []

# Stratum server. Off and private by default.
stratum:
  enabled: false
  # Optional explicit listener override in host:port form. Leave empty to let
  # the chart derive it as:
  #   0.0.0.0:<stratum.service.port> when allowPublic=true
  #   127.0.0.1:<stratum.service.port> when allowPublic=false
  # If set, the value MUST end with ":<stratum.service.port>"; edit
  # stratum.service.port to change the port.
  listen: ""
  allowPublic: false
  # miningAddress is REQUIRED whenever stratum.enabled=true. handshake-node
  # v0.2.0-rc1 refuses to start when --stratumlisten is set without
  # --miningaddr, even for a private (loopback) bind. Stratum credentials
  # (auth.existingSecret) are only required when allowPublic=true.
  miningAddress: ""
  auth:
    existingSecret: ""
    userKey: stratumuser
    passwordKey: stratumpass
  service:
    enabled: false
    type: ClusterIP
    port: 12040
    annotations: {}

# Probes are tolerant of long initial chain synchronisation.
startupProbe:
  enabled: true
  tcpSocket:
    port: p2p
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 240
readinessProbe:
  enabled: true
  tcpSocket:
    port: p2p
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 6
livenessProbe:
  enabled: true
  tcpSocket:
    port: p2p
  initialDelaySeconds: 120
  periodSeconds: 60
  timeoutSeconds: 10
  failureThreshold: 6

resources: {}
  # requests:
  #   cpu: 500m
  #   memory: 1Gi
  # limits:
  #   cpu: 2000m
  #   memory: 4Gi

# Additional environment variables (name/value pairs). These override the
# rendered defaults from .Values.config.
extraEnv: []

# Additional volumes/mounts.
extraVolumes: []
extraVolumeMounts: []

# Scheduling
nodeSelector: {}
affinity: {}
tolerations: []
topologySpreadConstraints: []
priorityClassName: ""

# Pod/container annotations and labels
podAnnotations: {}
podLabels: {}
serviceAnnotations: {}

# Termination grace period for graceful shutdown.
terminationGracePeriodSeconds: 60
