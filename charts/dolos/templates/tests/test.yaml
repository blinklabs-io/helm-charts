apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "dolos.fullname" . }}-test"
  labels:
    {{- include "dolos.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: busybox
      command: ['sh', '-c', 'echo "Dolos chart test passed"']