replicaCount: 1

updateStrategy:
  type: RollingUpdate

network: preview

# Optional custom peer address. If not set, a default public peer will be used.
peerAddress: ""

# Dolos configuration
image:
  repository: ghcr.io/txpipe/dolos
  tag: v1.3.2
  pullPolicy: IfNotPresent

podAnnotations: {}
podLabels: {}

resources:
  limits:
    cpu: "1"
    memory: "512Mi"
  requests:
    cpu: "500m"
    memory: "256Mi"
ports:
  grpc: 50051
  ouroboros: 30013
  # Mini-Blockfrost API
  minibf: 3001
  # MiniKupo API (optional, omit to disable)
  # minikupo: 1442

service:
  # Optional custom service name. If not set, release name will be used.
  name: ""
  ports:
    grpc: 15051
    ouroboros: 13013
    # Mini-Blockfrost API
    minibf: 13001
    # MiniKupo API (required if ports.minikupo is set)
    # minikupo: 11442

storage:
  # Mainnet requires at least 500Gi
  size: 50Gi
  # storageClassName: gp

# Prometheus Operator PodMonitor (requires monitoring.coreos.com CRDs)
podMonitor:
  enabled: false
  # Extra labels added to the PodMonitor metadata (e.g. release: kube-prometheus-stack)
  labels: {}
  # Pod labels to copy onto the scraped target
  podTargetLabels: []
  # Scrape endpoints. Each entry must reference a named container port that
  # exists on the dolos pod. Available named ports: `grpc`, `minibf`, and
  # (when ports.minikupo is set) `minikupo`.
  #
  # The MiniKupo /health endpoint returns plaintext; if you scrape it you must
  # also set ports.minikupo (e.g. 1442) and service.ports.minikupo so the
  # `minikupo` container port exists.
  podMetricsEndpoints:
    - port: minibf
      path: /health
      interval: 30s

tolerations: []

affinity: {}
# Example:
# affinity:
#   podAntiAffinity:
#     requiredDuringSchedulingIgnoredDuringExecution:
#       - labelSelector:
#           matchExpressions:
#             - key: "app.kubernetes.io/name"
#               operator: In
#               values:
#                 - dolos
#         topologyKey: "kubernetes.io/hostname"

# Socat sidecar configuration
socat:
  image:
    repository: "alpine/socat"
    tag: "1.8.0.3"
    pullPolicy: IfNotPresent
  resources: {}

